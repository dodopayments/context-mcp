name: Scheduled Documentation Reindex

on:
  # Run every 3 days at 2 AM UTC (7:30 AM IST)
  schedule:
    - cron: '0 2 */3 * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      full:
        description: 'Force a full rebuild instead of incremental reindex'
        required: false
        type: boolean
        default: false

jobs:
  reindex:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm clean-install

      - name: Restore index manifest
        uses: actions/cache/restore@v4
        with:
          path: data/index-manifest.json
          key: dodo-index-manifest-${{ github.run_id }}
          restore-keys: |
            dodo-index-manifest-

      - name: Run documentation reindex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full }}" = "true" ]; then
            npm run reindex:dodo:full
          else
            npm run reindex:dodo
          fi

      - name: Save index manifest
        if: ${{ success() }}
        uses: actions/cache/save@v4
        with:
          path: data/index-manifest.json
          key: dodo-index-manifest-${{ github.run_id }}
